name: Validate & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate all exercise.json files
        run: node scripts/validate.js

      - name: Rebuild dist/exercises.json
        run: bash scripts/combine.sh

      - name: Commit rebuilt dist (on main push only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/exercises.json
          git diff --cached --quiet || git commit -m "chore: rebuild dist/exercises.json [skip ci]"
          git push
